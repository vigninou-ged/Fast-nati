<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bibliothèque — BiblioFAST</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
<div class="app-layout">
  <aside class="app-sidebar" id="sidebar">
    <a href="dashboard.html" class="sidebar-brand">
      <div class="logo-mark">BF</div>
      <span class="logo-text">Biblio<span>FAST</span></span>
    </a>
    <nav class="sidebar-nav">
      <div class="sidebar-nav-label">Principal</div>
      <a href="dashboard.html" class="sidebar-link active"><i class="fas fa-th-large"></i> Bibliothèque</a>
      <a href="categories.html" class="sidebar-link"><i class="fas fa-folder"></i> Catégories</a>
      <a href="favoris.html" class="sidebar-link"><i class="fas fa-heart"></i> Mes favoris <span class="badge badge-red" id="fav-count-sidebar" style="display:none;">0</span></a>
      <div class="sidebar-nav-label">Mon compte</div>
      <a href="admin.html" class="sidebar-link" id="admin-nav-link" style="display:none;"><i class="fas fa-shield-alt"></i> Administration</a>
    </nav>
    <div class="sidebar-user">
      <div class="sidebar-user-avatar js-user-avatar">?</div>
      <div class="sidebar-user-info">
        <div class="sidebar-user-name js-user-name">Chargement…</div>
        <div class="sidebar-user-role js-user-role">Étudiant</div>
      </div>
      <button class="sidebar-logout js-logout" title="Se déconnecter"><i class="fas fa-sign-out-alt"></i></button>
    </div>
  </aside>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <div class="app-main">
    <div class="app-topbar">
      <div class="topbar-left">
        <button class="sidebar-mobile-toggle" aria-label="Menu"><i class="fas fa-bars"></i></button>
        <span class="app-topbar-title">Bibliothèque</span>
      </div>
      <div class="app-topbar-actions">
        <a href="favoris.html" class="btn btn-ghost btn-sm btn-icon" title="Mes favoris"><i class="fas fa-heart"></i></a>
        <button class="btn btn-ghost btn-sm btn-icon js-logout" title="Se déconnecter"><i class="fas fa-sign-out-alt"></i></button>
      </div>
    </div>
    <div class="app-content">
      <div class="page-header">
        <h1 class="page-header-title">Bienvenue, <span class="js-welcome-name" style="color:var(--brand-accent);">…</span> 👋</h1>
        <p class="page-header-subtitle">Que recherchez-vous aujourd'hui ?</p>
      </div>

      <div class="search-bar" style="margin-bottom:var(--s-6);max-width:660px;">
        <i class="fas fa-search"></i>
        <input type="text" id="search-input" placeholder="Rechercher un cours, un TD, un auteur…" autocomplete="off">
        <button class="btn btn-primary btn-sm" id="search-btn"><i class="fas fa-search"></i></button>
      </div>

      <div class="filter-bar" style="margin-bottom:var(--s-6);">
        <select class="filter-select" id="filter-categorie">
          <option value="">Toutes les catégories</option>
          <option value="1">Mathématiques</option>
          <option value="2">Informatique</option>
          <option value="3">Physique</option>
          <option value="4">Chimie</option>
          <option value="5">Biologie</option>
          <option value="6">Statistiques</option>
        </select>
        <select class="filter-select" id="filter-type">
          <option value="">Tous les types</option>
          <option value="pdf">PDF</option>
          <option value="cours">Cours</option>
          <option value="video">Vidéo</option>
          <option value="exercice">Exercice</option>
          <option value="resume">Résumé</option>
        </select>
        <select class="filter-select" id="filter-niveau">
          <option value="">Tous les niveaux</option>
          <option value="L1">L1</option>
          <option value="L2">L2</option>
          <option value="L3">L3</option>
          <option value="M1">M1</option>
          <option value="M2">M2</option>
        </select>
        <select class="filter-select" id="filter-tri">
          <option value="recent">Plus récents</option>
          <option value="populaire">Plus populaires</option>
          <option value="az">A → Z</option>
        </select>
        <button class="btn btn-ghost btn-sm" id="reset-btn"><i class="fas fa-times"></i> Réinitialiser</button>
      </div>

      <div class="filter-pills" id="cat-pills" style="margin-bottom:var(--s-6);">
        <button class="filter-pill active" data-cat="">Tout</button>
        <button class="filter-pill" data-cat="1">Mathématiques</button>
        <button class="filter-pill" data-cat="2">Informatique</button>
        <button class="filter-pill" data-cat="3">Physique</button>
        <button class="filter-pill" data-cat="4">Chimie</button>
        <button class="filter-pill" data-cat="5">Biologie</button>
        <button class="filter-pill" data-cat="6">Statistiques</button>
      </div>

      <div class="results-header">
        <span id="result-count" class="text-muted small">Chargement…</span>
      </div>

      <div class="resources-grid" id="skeleton-grid">
        <div class="skeleton-card"><div class="skeleton" style="height:48px;width:48px;border-radius:8px;margin-bottom:12px;"></div><div class="skeleton" style="height:14px;margin-bottom:8px;"></div><div class="skeleton" style="height:12px;width:70%;"></div></div><div class="skeleton-card"><div class="skeleton" style="height:48px;width:48px;border-radius:8px;margin-bottom:12px;"></div><div class="skeleton" style="height:14px;margin-bottom:8px;"></div><div class="skeleton" style="height:12px;width:70%;"></div></div><div class="skeleton-card"><div class="skeleton" style="height:48px;width:48px;border-radius:8px;margin-bottom:12px;"></div><div class="skeleton" style="height:14px;margin-bottom:8px;"></div><div class="skeleton" style="height:12px;width:70%;"></div></div><div class="skeleton-card"><div class="skeleton" style="height:48px;width:48px;border-radius:8px;margin-bottom:12px;"></div><div class="skeleton" style="height:14px;margin-bottom:8px;"></div><div class="skeleton" style="height:12px;width:70%;"></div></div><div class="skeleton-card"><div class="skeleton" style="height:48px;width:48px;border-radius:8px;margin-bottom:12px;"></div><div class="skeleton" style="height:14px;margin-bottom:8px;"></div><div class="skeleton" style="height:12px;width:70%;"></div></div><div class="skeleton-card"><div class="skeleton" style="height:48px;width:48px;border-radius:8px;margin-bottom:12px;"></div><div class="skeleton" style="height:14px;margin-bottom:8px;"></div><div class="skeleton" style="height:12px;width:70%;"></div></div>
      </div>

      <div class="resources-grid" id="resources-grid" style="display:none;"></div>

      <div class="empty-state" id="empty-state" style="display:none;">
        <div class="empty-state-icon">📚</div>
        <h3>Aucune ressource trouvée</h3>
        <p>Modifiez vos critères ou réinitialisez les filtres.</p>
        <button class="btn btn-secondary" id="empty-reset-btn" style="margin-top:var(--s-4);">Réinitialiser</button>
      </div>
    </div>
  </div>
</div>

<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script src="js/resources.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
