<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mes Favoris — BiblioFAST</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
<div class="app-layout">
  <aside class="app-sidebar" id="sidebar">
    <a href="dashboard.html" class="sidebar-brand">
      <div class="logo-mark">BF</div>
      <span class="logo-text">Biblio<span>FAST</span></span>
    </a>
    <nav class="sidebar-nav">
      <div class="sidebar-nav-label">Principal</div>
      <a href="dashboard.html" class="sidebar-link"><i class="fas fa-th-large"></i> Bibliothèque</a>
      <a href="categories.html" class="sidebar-link"><i class="fas fa-folder"></i> Catégories</a>
      <a href="favoris.html" class="sidebar-link active"><i class="fas fa-heart"></i> Mes favoris <span class="badge badge-red" id="fav-count-sidebar" style="display:none;">0</span></a>
      <div class="sidebar-nav-label">Mon compte</div>
      <a href="admin.html" class="sidebar-link" id="admin-nav-link" style="display:none;"><i class="fas fa-shield-alt"></i> Administration</a>
    </nav>
    <div class="sidebar-user">
      <div class="sidebar-user-avatar js-user-avatar">?</div>
      <div class="sidebar-user-info">
        <div class="sidebar-user-name js-user-name">Chargement…</div>
        <div class="sidebar-user-role js-user-role">Étudiant</div>
      </div>
      <button class="sidebar-logout js-logout" title="Se déconnecter"><i class="fas fa-sign-out-alt"></i></button>
    </div>
  </aside>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <div class="app-main">
    <div class="app-topbar">
      <div class="topbar-left">
        <button class="sidebar-mobile-toggle" aria-label="Menu"><i class="fas fa-bars"></i></button>
        <span class="app-topbar-title">Mes Favoris</span>
      </div>
      <div class="app-topbar-actions">
        
        <button class="btn btn-ghost btn-sm btn-icon js-logout" title="Se déconnecter"><i class="fas fa-sign-out-alt"></i></button>
      </div>
    </div>
    <div class="app-content">
      <div class="page-header">
        <h1 class="page-header-title"><i class="fas fa-heart" style="color:var(--brand-accent);margin-right:var(--s-3);"></i>Mes Favoris</h1>
        <p class="page-header-subtitle" id="fav-subtitle">Vos ressources sauvegardées</p>
      </div>
      <div class="resources-grid" id="fav-grid"></div>
      <div class="empty-state" id="empty-favs" style="display:none;">
        <div class="empty-state-icon">💔</div>
        <h3>Aucun favori pour l'instant</h3>
        <p>Ajoutez des ressources à vos favoris depuis la bibliothèque.</p>
        <a href="dashboard.html" class="btn btn-primary" style="margin-top:var(--s-5);"><i class="fas fa-th-large"></i> Explorer</a>
      </div>
    </div>
  </div>
</div>

<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script src="js/resources.js"></script>
<script src="js/favoris.js"></script>
</body>
</html>
